<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VS Code Overlay</title>

<style>
body {
    margin: 0;
    font-family: Consolas, monospace;
}

/* ✅ Background Image */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("vscode.png") no-repeat center center/cover;
    z-index: -1;
}

/* Floating Panel */
.panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: rgba(45, 45, 45, 0.95);
    padding: 12px;
    border-radius: 10px;
    width: 260px;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

/* Section */
.section {
    margin-bottom: 12px;
}

h4 {
    margin: 5px 0;
    font-size: 13px;
    color: #9cdcfe;
}

/* Buttons */
button {
    background: #007acc;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-top: 5px;
}

button.copied {
    background: #28a745;
}

/* Hide UI */
.hidden .panel {
    display: none;
}
</style>

</head>
<body>

<!-- Background -->
<div class="bg"></div>

<!-- Panel -->
<div class="panel" id="panel">

    <h4 class="section">3. WEB APPLICATION USING WEB CONTROLS</h4>

    <!-- ASPX -->
    <div class="section">
        <h4>📄 Default.aspx</h4>
        <button onclick="copyFromTextarea('code1', this)">Copy</button>
    </div>

    <!-- C# -->
    <div class="section">
        <h4>📄 Default.aspx.cs</h4>
        <button onclick="copyFromTextarea('code2', this)">Copy</button>
    </div>

    <!-- Hide -->
    <div class="section">
        <button onclick="toggleUI()">👁 Hide</button>
    </div>

</div>

<textarea id="code1" style="display:none;">
<!-- 3. WEB APPLICATION USING WEB CONTROLS -->
<%@ Page Language="C#" AutoEventWireup="true" 
CodeBehind="Default.aspx.cs" Inherits="webcontrols.Default" %> 
<!DOCTYPE html> 
<html> 
<head runat="server"> 
<title>Bio Data Form</title> 
</head> 
<body> 
<form id="form1" runat="server"> 
<center> 
<h2>Bio Data Form</h2> 
<fieldset style="width:400px;">

<table cellpadding="5"> 
<tr>

<td><asp:TextBox ID="txtName" runat="server" Width="200px" /></td> 
</tr> 
<tr> 
<td align="right">DOB:</td>

</tr> 
<tr> 
<td align="right">Gender:</td> 
<td> 
<asp:RadioButton ID="rbMale" runat="server" GroupName="gender" Text="Male" /> 
<asp:RadioButton ID="rbFemale" runat="server" GroupName="gender" Text="Female" /> 
</td> 
</tr> 
<tr> 
<td align="right">Email:</td> 
<td><asp:TextBox ID="txtEmail" runat="server" Width="200px" /></td> 
</tr> 
<tr> 
<td align="right">Course:</td> 
<td> 
<asp:DropDownList ID="ddlCourse" runat="server" Width="200px"> 
<asp:ListItem>Select</asp:ListItem> 
<asp:ListItem>BSc CS</asp:ListItem> 
<asp:ListItem>BCA</asp:ListItem> 
<asp:ListItem>MCA</asp:ListItem> 
</asp:DropDownList> 
</td> 
</tr> 
<tr> 
<td align="right">Skills:</td> 
<td><asp:TextBox ID="txtSkills" runat="server" Width="200px" /></td> 
</tr> 
<tr> 
<td colspan="2" align="center"> 
<asp:Button ID="btnSubmit" runat="server" Text="Submit" OnClick="btnSubmit_Click" /> 
</td> 
</tr> 
<tr> 
<td colspan="2"> 
<asp:Panel ID="pnlOutput" runat="server"> 
<asp:Label ID="lblOutput" runat="server" /> 
</asp:Panel> 
</td> 
</tr> 
</table> 
</fieldset> 
</center> 
</form> 
</body> 
</html> 


</textarea>

<textarea id="code2" style="display:none;">
// 3. WEB APPLICATION USING WEB CONTROLS
using System; using System.Web.UI; 
 
namespace webcontrols 
{ 
    public partial class Default : Page 
    { 
        protected void btnSubmit_Click(object sender, EventArgs e) 
        { 
            lblOutput.Text = 
            "Name: " + txtName.Text + "<br/>" + 
            "DOB: " + txtDob.Text + "<br/>" + 
            "Gender: " + (rbMale.Checked ? "Male" : "Female") + "<br/>" + 
            "Email: " + txtEmail.Text + "<br/>" + 
            "Course: " + ddlCourse.SelectedItem.Text + "<br/>" + 
            "Skills: " + txtSkills.Text; 
        } 
    } 
}

</textarea>

<script>

// Copy function
function copyFromTextarea(id, btn) {
    const text = document.getElementById(id).value;

    navigator.clipboard.writeText(text);

    btn.textContent = "Copied!";
    btn.classList.add("copied");

    setTimeout(() => {
        btn.textContent = "Copy";
        btn.classList.remove("copied");
    }, 1200);
}

// Hide UI
function toggleUI() {
    document.body.classList.toggle("hidden");
}

</script>

</body>
</html>

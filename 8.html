<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VS Code Overlay</title>

<style>
body {
    margin: 0;
    font-family: Consolas, monospace;
}

/* ✅ Background Image */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("vscode.png") no-repeat center center/cover;
    z-index: -1;
}

/* Floating Panel */
.panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: rgba(45, 45, 45, 0.95);
    padding: 12px;
    border-radius: 10px;
    width: 260px;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

/* Section */
.section {
    margin-bottom: 12px;
}

h4 {
    margin: 5px 0;
    font-size: 13px;
    color: #9cdcfe;
}

/* Buttons */
button {
    background: #007acc;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-top: 5px;
}

button.copied {
    background: #28a745;
}

/* Hide UI */
.hidden .panel {
    display: none;
}
</style>

</head>
<body>

<!-- Background -->
<div class="bg"></div>

<!-- Panel -->
<div class="panel" id="panel">

    <h4 class="section">8. VALIDATION CONTROL</h4>

    <!-- ASPX -->
    <div class="section">
        <h4>📄 Default.aspx</h4>
        <button onclick="copyFromTextarea('code1', this)">Copy</button>
    </div>

    <!-- C# -->
    <div class="section">
        <h4>📄 Default.aspx.cs</h4>
        <button onclick="copyFromTextarea('code2', this)">Copy</button>
    </div>

    <!-- Hide -->
    <div class="section">
        <button onclick="toggleUI()">👁 Hide</button>
    </div>

</div>

<!-- 8. VALIDATION CONTROL -->
<%@ Page Language="C#" %>
<!DOCTYPE html>
<html>
<head runat="server">
<title>User Registration</title>
<style>
body {
font-family: Arial;
background-color: #f2f2f2;
}
.box {
width: 360px;
margin: 100px auto;
padding: 20px;
background: #fff;
border: 1px solid #aaa;
border-radius: 6px;
}
h3 {
text-align: center;
}
.row {
margin-bottom: 10px;
}
.row label {   /* fixed */
display: block;
font-weight: bold;
}
.row input {
width: 95%;
}
.center {   /* fixed */
text-align: center;
}
.msg {
display: inline-block;
padding: 3px 6px;
font-size: 12px;
margin-top: 5px;
}
</style>
</head>

<body>
<form runat="server">

<div class="box">
<h3>User Registration</h3>

<div class="row">
<label>Name</label>
<asp:TextBox ID="txtName" runat="server" />
<asp:RequiredFieldValidator runat="server" ControlToValidate="txtName" ErrorMessage="Required"
ForeColor="Red" />
</div>

<div class="row">
<label>Email</label>
<asp:TextBox ID="txtEmail" runat="server" />
<asp:RequiredFieldValidator runat="server" ControlToValidate="txtEmail" ErrorMessage="Required"
ForeColor="Red" />
<asp:RegularExpressionValidator runat="server" ControlToValidate="txtEmail"
ValidationExpression="^[^@\s]+@[^@\s]+\.[^@\s]+$" ErrorMessage="Invalid" ForeColor="Red" />
</div>

<div class="row">
<label>Age</label>
<asp:TextBox ID="txtAge" runat="server" />
<asp:RangeValidator runat="server" ControlToValidate="txtAge" MinimumValue="18" MaximumValue="60"
Type="Integer" ErrorMessage="18–60 only" ForeColor="Red" />
</div>

<div class="row">
<label>Password</label>
<asp:TextBox ID="txtPassword" runat="server" TextMode="Password" />
<asp:RequiredFieldValidator runat="server" ControlToValidate="txtPassword" ErrorMessage="Required"
ForeColor="Red" />
</div>

<div class="row">
<label>Confirm Password</label>
<asp:TextBox ID="txtConfirm" runat="server" TextMode="Password" />
<asp:CompareValidator runat="server" ControlToValidate="txtConfirm" ControlToCompare="txtPassword"
ErrorMessage="Mismatch" ForeColor="Red" />
</div>

<div class="center">
<asp:Button runat="server" Text="Submit" OnClick="Submit_Click" /> <!-- fixed -->
<br />
<asp:Label ID="lblMsg" runat="server" CssClass="msg" ForeColor="Green" />
</div>
</div>
</form>

<script runat="server">
protected void Submit_Click(object sender, EventArgs e)   /* fixed name */
{
if (Page.IsValid)
{
lblMsg.Text = "Registration Successful";
}
}
</script>
</body>
</html>

// 8. VALIDATION CONTROL
using System;

namespace Input_validation_control
{
    public partial class _Default : System.Web.UI.Page
    {
        protected void Page_Load(object sender, EventArgs e)
        {
        }

        protected void btnSubmit_Click(object sender, EventArgs e)
        {
            if (Page.IsValid)
            {
                lblMessage.Text = "Registration Successful!";
            }
        }
    }
}









</textarea>

<script>

// Copy function
function copyFromTextarea(id, btn) {
    const text = document.getElementById(id).value;

    navigator.clipboard.writeText(text);

    btn.textContent = "Copied!";
    btn.classList.add("copied");

    setTimeout(() => {
        btn.textContent = "Copy";
        btn.classList.remove("copied");
    }, 1200);
}

// Hide UI
function toggleUI() {
    document.body.classList.toggle("hidden");
}

</script>

</body>
</html>
